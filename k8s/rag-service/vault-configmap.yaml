        slug: vsgun-com
        max_pages: 10000
        max_depth: 10
        crawl_delay: 1.5
        url_include_patterns: []
        use_firecrawl: true

      - url: https://airsoftyecla.es
        name: Airsoft Yecla
        slug: airsoftyecla-es
        max_pages: 10000
        max_depth: 10
