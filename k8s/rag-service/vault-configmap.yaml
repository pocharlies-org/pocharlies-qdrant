        type: brand_site
        max_pages: 200
        max_depth: 2
        crawl_delay: 2.0
        focus_topics: ["new product", "lineup", "series"]

      - url: https://www.vegaforce.com
        name: VFC Official
        slug: vfc-official
        type: brand_site
        max_pages: 150
        max_depth: 2
        crawl_delay: 2.0
        focus_topics: ["new product", "gbb", "aeg"]

    messaging:
      enabled: false
      platforms: []

    schedule:
      rebuild_cron: "0 3 * * *"

    health:
      max_age_days: 2
