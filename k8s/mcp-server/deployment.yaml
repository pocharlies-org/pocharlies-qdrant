apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: pocharlies-rag
  labels:
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: ghcr.io/pocharlies/mcp-server:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: pocharlies-config
          env:
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pocharlies-secrets
                  key: QDRANT_API_KEY
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
          readinessProbe:
            httpGet:
              path: /sse
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache
