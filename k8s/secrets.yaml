# IMPORTANT: Replace placeholder values before applying.
# For production, use Sealed Secrets or External Secrets Operator.
#
# To create from CLI instead:
#   kubectl create secret generic pocharlies-secrets -n pocharlies-rag \
#     --from-literal=QDRANT_API_KEY=<value> \
#     --from-literal=LLM_API_KEY=<value> \
#     --from-literal=SHOPIFY_ACCESS_TOKEN=<value> \
#     --from-literal=SHOPIFY_WEBHOOK_SECRET=<value> \
#     --from-literal=POSTGRES_PASSWORD=<value> \
#     --from-literal=PICQER_API_KEY=<value>
apiVersion: v1
kind: Secret
metadata:
  name: pocharlies-secrets
  namespace: pocharlies-rag
type: Opaque
stringData:
  QDRANT_API_KEY: "REPLACE_ME"
  LLM_API_KEY: "REPLACE_ME"
  SHOPIFY_ACCESS_TOKEN: "REPLACE_ME"
  SHOPIFY_WEBHOOK_SECRET: "REPLACE_ME"
  SHOPIFY_SHOP_DOMAIN: "skirmshop-es.myshopify.com"
  POSTGRES_PASSWORD: "REPLACE_ME"
  PICQER_API_KEY: "REPLACE_ME"
