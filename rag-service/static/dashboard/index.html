<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Brain Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <header>
        <h1>Knowledge Brain Dashboard</h1>
        <nav>
            <button class="tab active" data-tab="ops">Operations</button>
            <button class="tab" data-tab="vault">Vault Browser</button>
        </nav>
    </header>
    <main>
        <section id="ops" class="tab-content active">
            <div class="stats-grid" id="stats-cards"></div>
            <div class="section">
                <h2>Qdrant Collections</h2>
                <div id="collections-table"></div>
            </div>
            <div class="section">
                <h2>Last 24h Activity</h2>
                <div id="timeline"></div>
            </div>
            <div class="actions">
                <button onclick="triggerAction('/knowledge/rebuild', this)">Rebuild Now</button>
                <button onclick="triggerAction('/knowledge/synthesize?force=true', this)">Synthesize Now</button>
                <button onclick="triggerAction('/knowledge/reindex?force=true', this)">Reindex</button>
            </div>
        </section>
        <section id="vault" class="tab-content">
            <div class="vault-layout">
                <div class="vault-sidebar">
                    <input type="text" id="vault-search" placeholder="Search notes..." oninput="filterNotes(this.value)">
                    <div id="vault-tree"></div>
                </div>
                <div class="vault-content">
                    <div id="vault-meta"></div>
                    <div id="vault-note"><p class="placeholder">Select a note from the sidebar</p></div>
                </div>
            </div>
        </section>
    </main>
    <div id="toast" class="toast"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
